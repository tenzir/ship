name: Release (Advanced)

on:
  workflow_call:
    inputs:
      bump:
        description: "Version bump type: major, minor, or patch (empty/auto = infer from unreleased entries)"
        required: false
        default: ""
        type: string
      version:
        description: "Explicit stable release version (for example v1.2.3). Prefer `rc` for release candidates."
        required: false
        default: ""
        type: string
      rc:
        description: "Create or continue the release-candidate series for the resolved stable version"
        required: false
        default: false
        type: boolean
      intro:
        description: "1-2 sentence release introduction"
        required: true
        type: string
      title:
        description: "User-facing release title (empty = auto-generated)"
        required: false
        default: ""
        type: string
      changelog-root:
        description: "Project root for --root flag"
        required: false
        default: "."
        type: string
      git-add-paths:
        description: "Space-separated extra paths to stage before publish"
        required: false
        default: ""
        type: string
      pre-create:
        description: "Shell script for quality gates (runs before release create)"
        required: false
        default: ""
        type: string
      post-create:
        description: "Shell script for version bumping (runs after release create)"
        required: false
        default: ""
        type: string
      pre-publish:
        description: "Shell script that runs after release create and before publish"
        required: false
        default: ""
        type: string
      post-publish:
        description: "Shell script that runs after publish and branch updates"
        required: false
        default: ""
        type: string
      skip-publish:
        description: "Create and prepare release but skip publish/tag/branch updates"
        required: false
        default: false
        type: boolean
      publish-no-latest-on-non-main:
        description: "Pass --no-latest on non-main branch releases"
        required: false
        default: false
        type: boolean
      copy-release-to-main-on-non-main:
        description: "Copy changelog/releases/<version> to main for non-main releases"
        required: false
        default: false
        type: boolean
      update-latest-branch-on-main:
        description: "Force-update latest branch when releasing from main"
        required: false
        default: false
        type: boolean
      github_app_id:
        description: "Optional GitHub App ID used to mint a repository-scoped token"
        required: false
        default: ""
        type: string
      git_user_name:
        description: "Git author name used for release commits"
        required: false
        default: "github-actions[bot]"
        type: string
      git_user_email:
        description: "Git author email used for release commits"
        required: false
        default: "41898282+github-actions[bot]@users.noreply.github.com"
        type: string
      sign_commits:
        description: "Whether to sign commits when a GPG key is provided"
        required: false
        default: true
        type: boolean
      sign_tags:
        description: "Whether to sign tags when a GPG key is provided"
        required: false
        default: true
        type: boolean
    secrets:
      push_token:
        required: false
      github_app_private_key:
        required: false
      gpg_private_key:
        required: false
    outputs:
      version:
        description: "Created release version tag (for example v1.2.3)"
        value: ${{ jobs.release.outputs.version }}
      is_latest:
        description: "Whether the created release should be treated as latest"
        value: ${{ jobs.release.outputs.is_latest }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.create-release.outputs.version }}
      is_latest: ${{ steps.determine-latest.outputs.is_latest }}

    steps:
      - name: Validate release inputs
        env:
          RELEASE_BUMP: ${{ inputs.bump }}
          GITHUB_APP_ID: ${{ inputs.github_app_id }}
          GITHUB_APP_PRIVATE_KEY: ${{ secrets.github_app_private_key }}
          GIT_USER_NAME: ${{ inputs.git_user_name }}
          GIT_USER_EMAIL: ${{ inputs.git_user_email }}
        run: |
          case "$RELEASE_BUMP" in
            ""|auto|major|minor|patch) ;;
            *)
              echo "::error::Invalid bump value '$RELEASE_BUMP'. Use empty, auto, major, minor, or patch."
              exit 1
              ;;
          esac

          if [ -n "${{ inputs.version }}" ] && [ -n "${{ inputs.bump }}" ] && [ "${{ inputs.bump }}" != "auto" ]; then
            echo "::error::Provide either an explicit version or a manual bump, not both."
            exit 1
          fi

          if [ "${{ inputs.rc }}" = "true" ] && [[ "${{ inputs.version }}" == *-* ]]; then
            echo "::error::rc expects a stable base version like v1.2.3, not a prerelease version."
            exit 1
          fi

          if [ -n "$GITHUB_APP_ID" ] && [ -z "$GITHUB_APP_PRIVATE_KEY" ]; then
            echo "::error::Input 'github_app_id' requires secret 'github_app_private_key'."
            exit 1
          fi

          if [ -z "$GITHUB_APP_ID" ] && [ -n "$GITHUB_APP_PRIVATE_KEY" ]; then
            echo "::error::Secret 'github_app_private_key' requires input 'github_app_id'."
            exit 1
          fi

          if [ -z "$GIT_USER_NAME" ] || [ -z "$GIT_USER_EMAIL" ]; then
            echo "::error::Both 'git_user_name' and 'git_user_email' must be non-empty."
            exit 1
          fi

      - name: Resolve optional credentials
        id: optional-credentials
        env:
          GPG_PRIVATE_KEY: ${{ secrets.gpg_private_key }}
        run: |
          if [ -n "$GPG_PRIVATE_KEY" ]; then
            echo "has_gpg_key=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_gpg_key=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install tenzir-ship
        run: uv tool install tenzir-ship

      - name: Generate app token
        id: app-token
        if: ${{ inputs.github_app_id != '' }}
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ inputs.github_app_id }}
          private-key: ${{ secrets.github_app_private_key }}

      - name: Resolve auth token
        id: auth-token
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
          PUSH_TOKEN: ${{ secrets.push_token }}
          DEFAULT_TOKEN: ${{ github.token }}
        run: |
          if [ -n "$APP_TOKEN" ]; then
            TOKEN="$APP_TOKEN"
            SOURCE="github-app"
          elif [ -n "$PUSH_TOKEN" ]; then
            TOKEN="$PUSH_TOKEN"
            SOURCE="push-token"
          else
            TOKEN="$DEFAULT_TOKEN"
            SOURCE="github-token"
          fi
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"
          echo "source=$SOURCE" >> "$GITHUB_OUTPUT"

      - name: Set up GPG signing
        if: ${{ steps.optional-credentials.outputs.has_gpg_key == 'true' }}
        uses: crazy-max/ghaction-import-gpg@v7
        with:
          gpg_private_key: ${{ secrets.gpg_private_key }}
          git_user_signingkey: true
          git_commit_gpgsign: ${{ inputs.sign_commits }}
          git_tag_gpgsign: ${{ inputs.sign_tags }}

      - name: Configure Git
        env:
          AUTH_TOKEN: ${{ steps.auth-token.outputs.token }}
          GIT_USER_NAME: ${{ inputs.git_user_name }}
          GIT_USER_EMAIL: ${{ inputs.git_user_email }}
        run: |
          git config --global user.name "$GIT_USER_NAME"
          git config --global user.email "$GIT_USER_EMAIL"
          git remote set-url origin "https://x-access-token:${AUTH_TOKEN}@github.com/${{ github.repository }}.git"

      - name: Determine release branch
        id: release-type
        run: |
          BRANCH="${GITHUB_REF_NAME:-$(git rev-parse --abbrev-ref HEAD)}"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Run pre-create script
        if: inputs.pre-create != ''
        run: ${{ inputs.pre-create }}

      - name: Create release
        id: create-release
        run: |
          TITLE_ARGS=()
          if [ -n "$RELEASE_TITLE" ]; then
            TITLE_ARGS=(--title "$RELEASE_TITLE")
          fi
          BUMP_ARGS=()
          case "$RELEASE_BUMP" in
            major|minor|patch)
              BUMP_ARGS=("--$RELEASE_BUMP")
              ;;
            ""|auto)
              # `auto` exists for callers that use constrained inputs (for example
              # workflow_dispatch choice) and cannot pass an empty value.
              ;;
          esac
          RC_ARGS=()
          if [ "$RELEASE_RC" = "true" ]; then
            RC_ARGS=(--rc)
          fi
          VERSION_ARG=()
          if [ -n "$RELEASE_VERSION" ]; then
            VERSION_ARG=("$RELEASE_VERSION")
          fi
          VERSION=$(tenzir-ship --root "$CHANGELOG_ROOT" release create \
            "${VERSION_ARG[@]}" \
            "${BUMP_ARGS[@]}" \
            "${RC_ARGS[@]}" \
            --intro "$RELEASE_INTRO" \
            "${TITLE_ARGS[@]}" \
            --yes)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
        env:
          CHANGELOG_ROOT: ${{ inputs.changelog-root }}
          RELEASE_TITLE: ${{ inputs.title }}
          RELEASE_INTRO: ${{ inputs.intro }}
          RELEASE_BUMP: ${{ inputs.bump }}
          RELEASE_VERSION: ${{ inputs.version }}
          RELEASE_RC: ${{ inputs.rc }}

      - name: Run post-create script
        if: inputs.post-create != ''
        run: ${{ inputs.post-create }}

      - name: Determine latest status
        id: determine-latest
        env:
          BRANCH: ${{ steps.release-type.outputs.branch }}
          CHANGELOG_ROOT: ${{ inputs.changelog-root }}
          RELEASE_VERSION: ${{ steps.create-release.outputs.version }}
        run: |
          if [[ "$RELEASE_VERSION" == *-* ]]; then
            echo "is_latest=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          LATEST_STABLE=$(tenzir-ship --root "$CHANGELOG_ROOT" release version)
          if [ "$BRANCH" = "main" ] && [ "$RELEASE_VERSION" = "$LATEST_STABLE" ]; then
            echo "is_latest=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_latest=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run pre-publish script
        if: ${{ inputs.pre-publish != '' && !inputs['skip-publish'] }}
        run: ${{ inputs.pre-publish }}
        env:
          CHANGELOG_ROOT: ${{ inputs.changelog-root }}
          RELEASE_VERSION: ${{ steps.create-release.outputs.version }}
          GH_TOKEN: ${{ steps.auth-token.outputs.token }}

      - name: Stage and publish
        if: ${{ !inputs['skip-publish'] }}
        run: |
          git add "$CHANGELOG_ROOT/changelog"

          # Stage tracked updates outside changelog as well (for example
          # auto-detected version files updated by `release create`).
          git add -u

          if [ -n "$GIT_ADD_PATHS" ]; then
            # shellcheck disable=SC2086 # Intentional word splitting.
            git add $GIT_ADD_PATHS
          fi
          PUBLISH_ARGS=(--commit --tag --yes)
          if [ "$IS_LATEST" != "true" ] && { [ "$BRANCH" = "main" ] || [ "$NO_LATEST_NON_MAIN" = "true" ]; }; then
            PUBLISH_ARGS+=(--no-latest)
          fi
          tenzir-ship --root "$CHANGELOG_ROOT" release publish "$RELEASE_VERSION" "${PUBLISH_ARGS[@]}"
        env:
          BRANCH: ${{ steps.release-type.outputs.branch }}
          CHANGELOG_ROOT: ${{ inputs.changelog-root }}
          GIT_ADD_PATHS: ${{ inputs.git-add-paths }}
          RELEASE_VERSION: ${{ steps.create-release.outputs.version }}
          IS_LATEST: ${{ steps.determine-latest.outputs.is_latest }}
          NO_LATEST_NON_MAIN: ${{ inputs.publish-no-latest-on-non-main }}
          GH_TOKEN: ${{ steps.auth-token.outputs.token }}

      - name: Copy release to main branch (non-main release)
        if: ${{ !inputs['skip-publish'] && inputs.copy-release-to-main-on-non-main && steps.release-type.outputs.branch != 'main' }}
        run: |
          RELEASE_DIR="$CHANGELOG_ROOT/changelog/releases/$RELEASE_VERSION"
          TMP_DIR="$(mktemp -d)"
          cp -R "$RELEASE_DIR" "$TMP_DIR/"
          git fetch origin main
          git checkout main
          mkdir -p "$CHANGELOG_ROOT/changelog/releases"
          if [ -e "$RELEASE_DIR" ]; then
            echo "Release directory already present on main; skipping copy."
            exit 0
          fi
          cp -R "$TMP_DIR/$RELEASE_VERSION" "$RELEASE_DIR"
          git add "$RELEASE_DIR"
          git commit -s -m "Add backport release $RELEASE_VERSION"
          git push origin main
        env:
          CHANGELOG_ROOT: ${{ inputs.changelog-root }}
          RELEASE_VERSION: ${{ steps.create-release.outputs.version }}

      - name: Update latest branch
        if: ${{ !inputs['skip-publish'] && inputs.update-latest-branch-on-main && steps.determine-latest.outputs.is_latest == 'true' }}
        run: |
          git checkout -B latest
          git push origin latest --force

      - name: Run post-publish script
        if: ${{ inputs.post-publish != '' && !inputs['skip-publish'] }}
        run: ${{ inputs.post-publish }}
        env:
          CHANGELOG_ROOT: ${{ inputs.changelog-root }}
          RELEASE_VERSION: ${{ steps.create-release.outputs.version }}
          IS_LATEST: ${{ steps.determine-latest.outputs.is_latest }}
          GH_TOKEN: ${{ steps.auth-token.outputs.token }}

      - name: Summary
        env:
          GPG_ENABLED: ${{ steps.optional-credentials.outputs.has_gpg_key }}
          SIGN_COMMITS: ${{ inputs.sign_commits }}
          SIGN_TAGS: ${{ inputs.sign_tags }}
        run: |
          VERSION="${{ steps.create-release.outputs.version }}"
          IS_LATEST="${{ steps.determine-latest.outputs.is_latest }}"
          AUTH_SOURCE="${{ steps.auth-token.outputs.source }}"
          COMMIT_SIGNING=false
          TAG_SIGNING=false
          if [ "$GPG_ENABLED" = "true" ]; then
            COMMIT_SIGNING="$SIGN_COMMITS"
            TAG_SIGNING="$SIGN_TAGS"
          fi
          {
            echo "## Release ${VERSION}"
            echo ""
            echo "Successfully released version **${VERSION}**."
            echo ""
            echo "- Branch: \`${GITHUB_REF_NAME}\`"
            echo "- Latest release: \`${IS_LATEST}\`"
            echo "- Publish skipped: \`${{ inputs['skip-publish'] }}\`"
            echo "- Auth mode: \`${AUTH_SOURCE}\`"
            echo "- Commit signing: \`${COMMIT_SIGNING}\`"
            echo "- Tag signing: \`${TAG_SIGNING}\`"
          } >> "$GITHUB_STEP_SUMMARY"
