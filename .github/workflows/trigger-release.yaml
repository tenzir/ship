name: Release

on:
  workflow_dispatch:
    inputs:
      intro:
        description: |
          Intro of the release

          Leave empty to auto-generate the intro from the pending changelog
          entries. When set manually, the intro should be 1-2 sentences long,
          must be written in active voice, and should clearly communicate the
          theme of the release to the user. Use full sentences and avoid
          abbreviations.
        required: false
        default: ""
        type: string
      title:
        description: |
          User-facing release title (auto-generated if omitted)
        required: false
        type: string

jobs:
  prepare-release-metadata:
    name: Prepare release metadata
    runs-on: ubuntu-latest
    outputs:
      intro: ${{ steps.metadata.outputs.intro }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false

      - name: Generate release metadata
        id: metadata
        run: |
          uv sync --dev
          uv run tenzir-ship release plan --json > release-plan.json
          python .github/scripts/generate_release_metadata.py release-plan.json >> "$GITHUB_OUTPUT"

  validate-release-config:
    name: Validate release workflow configuration
    runs-on: ubuntu-latest

    steps:
      - name: Validate release configuration
        env:
          TENZIR_GITHUB_APP_ID: ${{ vars.TENZIR_GITHUB_APP_ID }}
          TENZIR_GITHUB_APP_PRIVATE_KEY: ${{ secrets.TENZIR_GITHUB_APP_PRIVATE_KEY }}
          TENZIR_BOT_GPG_SIGNING_KEY: ${{ secrets.TENZIR_BOT_GPG_SIGNING_KEY }}
        run: |
          if [ -z "$TENZIR_GITHUB_APP_ID" ]; then
            echo "::error::Repository variable 'TENZIR_GITHUB_APP_ID' must be set for release runs."
            exit 1
          fi

          if [ -z "$TENZIR_GITHUB_APP_PRIVATE_KEY" ]; then
            echo "::error::Repository secret 'TENZIR_GITHUB_APP_PRIVATE_KEY' must be set for release runs."
            exit 1
          fi

          if [ -z "$TENZIR_BOT_GPG_SIGNING_KEY" ]; then
            echo "::error::Repository secret 'TENZIR_BOT_GPG_SIGNING_KEY' must be set for release runs."
            exit 1
          fi

  release:
    name: Create GitHub release
    needs:
      - prepare-release-metadata
      - validate-release-config
    permissions:
      contents: write
    uses: ./.github/workflows/release.yaml
    with:
      intro: ${{ inputs.intro != '' && inputs.intro || needs.prepare-release-metadata.outputs.intro }}
      title: ${{ inputs.title }}
      git-add-paths: pyproject.toml uv.lock
      pre-create: |
        uv sync --dev
        uv run ruff check
        uv run ruff format --check
        uv run mypy
        uv run pytest
        uv build
      post-create: |
        uv lock
      github_app_id: ${{ vars.TENZIR_GITHUB_APP_ID }}
      git_user_name: tenzir-bot
      git_user_email: engineering@tenzir.com
      sign_commits: true
      sign_tags: true
    secrets:
      github_app_private_key: ${{ secrets.TENZIR_GITHUB_APP_PRIVATE_KEY }}
      gpg_private_key: ${{ secrets.TENZIR_BOT_GPG_SIGNING_KEY }}
