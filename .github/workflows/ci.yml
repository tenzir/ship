name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Tests (${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.12", "3.13"]
        exclude:
          - os: macos-latest
            python-version: "3.13"

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --python ${{ matrix.python-version }} --dev

      - name: Ruff lint
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: uv run ruff check

      - name: Ruff format (check)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: uv run ruff format --check

      - name: Type check
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: uv run mypy

      - name: Run tests
        run: uv run pytest --durations=10

  lint-workflows:
    name: Actionlint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Install actionlint
        run: go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.7

      - name: Run actionlint
        run: |
          ACTIONLINT_BIN="$(go env GOPATH)/bin/actionlint"
          "$ACTIONLINT_BIN"

  smoke-reusable-release-default-token:
    name: Release smoke (default token)
    if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork }}
    permissions:
      contents: write
    uses: ./.github/workflows/reusable-release.yaml
    with:
      bump: patch
      intro: Smoke test the reusable release workflow with the caller GITHUB_TOKEN.
      skip-publish: true

  smoke-reusable-release-push-token:
    name: Release smoke (push token)
    if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork }}
    permissions:
      contents: write
    uses: ./.github/workflows/reusable-release.yaml
    with:
      bump: patch
      intro: Smoke test the reusable release workflow with an explicit push token.
      use_push_token: true
      skip-publish: true
    secrets:
      push_token: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install 3.12

      - name: Build package
        run: |
          uv build
          ls -la dist/

      - name: Check package metadata
        run: |
          uv venv
          uv pip install check-wheel-contents twine
          uv run check-wheel-contents dist/*.whl
          uv run twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: python-package-distributions
          path: dist/
          retention-days: 7

  test-install:
    name: Install (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: build
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          name: python-package-distributions
          path: dist/

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Smoke test wheel
        run: uvx --from dist/*.whl tenzir-ship --help
