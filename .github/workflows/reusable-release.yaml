name: Release

on:
  workflow_call:
    inputs:
      bump:
        description: "Version bump type: major, minor, or patch (empty/auto = infer from unreleased entries)"
        required: false
        default: ""
        type: string
      version:
        description: "Explicit stable release version (for example v1.2.3). Prefer `rc` for release candidates."
        required: false
        default: ""
        type: string
      rc:
        description: "Create or continue the release-candidate series for the resolved stable version"
        required: false
        default: false
        type: boolean
      intro:
        description: "1-2 sentence release introduction"
        required: true
        type: string
      title:
        description: "User-facing release title (empty = auto-generated)"
        required: false
        default: ""
        type: string
      changelog-root:
        description: "Project root for --root flag"
        required: false
        default: "."
        type: string
      git-add-paths:
        description: "Space-separated extra paths to stage before publish"
        required: false
        default: ""
        type: string
      pre-create:
        description: "Shell script for quality gates (runs before release create)"
        required: false
        default: ""
        type: string
      post-create:
        description: "Shell script for version bumping (runs after release create)"
        required: false
        default: ""
        type: string
      github_app_id:
        description: "Optional GitHub App ID used to mint a repository-scoped token"
        required: false
        default: ""
        type: string
      git_user_name:
        description: "Git author name used for release commits"
        required: false
        default: "github-actions[bot]"
        type: string
      git_user_email:
        description: "Git author email used for release commits"
        required: false
        default: "41898282+github-actions[bot]@users.noreply.github.com"
        type: string
      sign_commits:
        description: "Whether to sign commits when a GPG key is provided"
        required: false
        default: true
        type: boolean
      sign_tags:
        description: "Whether to sign tags when a GPG key is provided"
        required: false
        default: true
        type: boolean
    secrets:
      push_token:
        required: false
      github_app_private_key:
        required: false
      gpg_private_key:
        required: false
    outputs:
      version:
        description: "Created release version tag (for example v1.2.3)"
        value: ${{ jobs.release.outputs.version }}
      is_latest:
        description: "Whether the created release should be treated as latest"
        value: ${{ jobs.release.outputs.is_latest }}

jobs:
  release:
    uses: ./.github/workflows/reusable-release-advanced.yaml
    with:
      bump: ${{ inputs.bump }}
      version: ${{ inputs.version }}
      rc: ${{ inputs.rc }}
      intro: ${{ inputs.intro }}
      title: ${{ inputs.title }}
      changelog-root: ${{ inputs.changelog-root }}
      git-add-paths: ${{ inputs.git-add-paths }}
      pre-create: ${{ inputs.pre-create }}
      post-create: ${{ inputs.post-create }}
      pre-publish: ""
      post-publish: ""
      skip-publish: false
      publish-no-latest-on-non-main: false
      copy-release-to-main-on-non-main: false
      update-latest-branch-on-main: false
      github_app_id: ${{ inputs.github_app_id }}
      git_user_name: ${{ inputs.git_user_name }}
      git_user_email: ${{ inputs.git_user_email }}
      sign_commits: ${{ inputs.sign_commits }}
      sign_tags: ${{ inputs.sign_tags }}
    secrets:
      push_token: ${{ secrets.push_token }}
      github_app_private_key: ${{ secrets.github_app_private_key }}
      gpg_private_key: ${{ secrets.gpg_private_key }}
